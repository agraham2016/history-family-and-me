<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="History, Family, and Me  tree of life emblem">
  <defs>
    <linearGradient id="hfmGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c98a"/>
      <stop offset="1" stop-color="#c08a2d"/>
    </linearGradient>
  </defs>

  <!-- Medallion -->
  <circle cx="32" cy="32" r="30" fill="#faf6ef" stroke="url(#hfmGold)" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="25.5" fill="none" stroke="#c08a2d" stroke-width="1" opacity="0.45"/>

  <!-- Tree of life: branches above, roots below (symmetry = generations) -->
  <g fill="none" stroke="#7a2e3b" stroke-width="1.8" stroke-linecap="round">
    <!-- trunk -->
    <path d="M32 40 L32 27"/>
    <!-- upper branches -->
    <path d="M32 28 C 27 25, 23 23, 19 19"/>
    <path d="M32 28 C 37 25, 41 23, 45 19"/>
    <path d="M32 27 C 29 22, 27 19, 25 14"/>
    <path d="M32 27 C 35 22, 37 19, 39 14"/>
    <path d="M32 27 L32 12"/>
    <!-- roots (mirror of branches) -->
    <path d="M32 40 C 27 44, 23 46, 19 50"/>
    <path d="M32 40 C 37 44, 41 46, 45 50"/>
    <path d="M32 40 C 29 45, 27 49, 26 53"/>
    <path d="M32 40 C 35 45, 37 49, 38 53"/>
    <path d="M32 40 L32 52"/>
  </g>

  <!-- Leaves / life at the branch tips -->
  <g fill="url(#hfmGold)">
    <circle cx="32" cy="11" r="2.4"/>
    <circle cx="19" cy="18.5" r="2.2"/>
    <circle cx="45" cy="18.5" r="2.2"/>
    <circle cx="24.5" cy="13.5" r="2"/>
    <circle cx="39.5" cy="13.5" r="2"/>
  </g>

  <!-- Heart at the heart of the tree (family) -->
  <path d="M32 33.4c-1.6-1.5-4-2.7-4-4.9a2.1 2.1 0 0 1 4-.9 2.1 2.1 0 0 1 4 .9c0 2.2-2.4 3.4-4 4.9z" fill="#7a2e3b"/>
</svg>
